  if (flap) flap.style.transform = 'rotateX(180deg)';
  
  // Pull out letter
  const surat = document.getElementById('isiSurat');
  if (surat) {
    surat.style.transform = 'translateY(-20px)';
    surat.style.boxShadow = '0 15px 25px rgba(0,0,0,0.15)';
  }
  
  // Change instruction text
  const instruksi = document.getElementById('instruksiSurat');
  if (instruksi) instruksi.innerHTML = '✨ Sekarang pencet tombol di bawah ✨';
  
  // SHOW THE NEXT BUTTON
  const btn = document.getElementById('btnLanjutKePage4');
  if (btn) btn.style.display = 'inline-block';
}

  <script>
const snoopies = document.querySelectorAll('.snoopy');
const total = snoopies.length;

snoopies.forEach((snoopy, i) => {
  const sectionWidth = 100 / total;
  const min = sectionWidth * i;
  const max = min + sectionWidth;

  const randomLeft = min + Math.random() * sectionWidth;
  const randomDelay = Math.random() * 10;
  const randomDuration = 18 + Math.random() * 8;

  snoopy.style.left = randomLeft + '%';
  snoopy.style.animationDuration = randomDuration + 's';
  snoopy.style.animationDelay = randomDelay + 's';
});
